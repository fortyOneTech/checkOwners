analysis:
  lookback_days: 365
  min_commits: 1
  top_n_owners: 3
  confidence_threshold: 0.2
scoring:
  recency_half_life_days: 90
  recency_weight: 0.35
  frequency_weight: 0.25
  blame_weight: 0.25
  review_weight: 0.15
decay:
  threshold_days: 180
  alert_on_decay: true
bus_factor:
  critical_threshold: 1
  warn_threshold: 2
paths:
  exclude:
    - "*.lock"
    - "dist/**"
    - "vendor/**"
    - "node_modules/**"
    - ".instructions/**"
output:
  header: "# Generated by checkOwners. Do not edit manually."
  include_unowned: false
  include_confidence: true
drift:
  mode: both
  compare_to: auto
  min_confidence_delta: 0.2
notifications:
  webhook_url: ""
  severity_threshold: medium
github:
  org: ""
  resolve_handles: true
  resolve_teams: true
  api_enabled: false
