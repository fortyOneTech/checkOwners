name: checkowners-example

on:
  pull_request:

jobs:
  drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write           # required to label PRs as ownership-critical
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # git log + git blame need the full history

      # The action posts the drift + bus-factor summary comment itself
      # (comment_on_pr defaults to "true"); the calling workflow only needs to
      # grant pull-requests: write, which it does above.
      - id: checkowners
        uses: ./
        with:
          mode: both
          # Keep the action non-failing so the label + fail steps below still
          # run; this workflow gates the merge with its own final step.
          fail_on_drift: "false"

      # Example of consuming the action's outputs for custom logic.
      - name: Add ownership-critical label
        if: fromJson(steps.checkowners.outputs.bus_factor_summary).critical_paths[0]
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['ownership-critical'],
            });

      - name: Fail when drift detected
        if: fromJson(steps.checkowners.outputs.checkowners_drift).drift_detected
        run: |
          echo "checkowners drift detected. Run checkowners sync to resolve."
          exit 1
