name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # required so git log / git blame have history

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install hatch
        run: pip install hatch

      - name: Run tests
        run: hatch run test

  smoke:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install built wheel
        run: |
          pip install hatch
          hatch build
          pip install "dist/checkowners-"*"-py3-none-any.whl[graph]"

      - name: Smoke-test new commands
        run: |
          checkowners analyze --json > analyze.json
          checkowners drift --json > drift.json
          checkowners bus-factor --all --json > bus.json
          checkowners decay --json > decay.json
          checkowners topology --json > topology.json
          checkowners balance --json > balance.json
          # Confirm the artifacts have the expected top-level keys.
          python -c "import json; d=json.load(open('drift.json')); assert 'drift_detected' in d and 'severity' in d, d"
          python -c "import json; d=json.load(open('bus.json')); assert 'entries' in d, d"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install hatch
        run: pip install hatch

      - name: Run linters
        run: hatch run lint

      - name: Check formatting
        run: hatch run fmt --check
